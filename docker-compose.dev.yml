version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: eduflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
      MYSQL_DATABASE: teaching_manager
    ports:
      - "3307:3306"
    volumes:
      - eduflow_mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  eduflow_mysql_data:
